# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-added-large-files" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "oxlint", name = "oxlint", language = "system", entry = "bun run lint", files = '\.tsx?$', pass_filenames = false },
  { id = "oxfmt-check", name = "oxfmt", language = "system", entry = "bun run fmt:check", files = '\.tsx?$', pass_filenames = false },
]
